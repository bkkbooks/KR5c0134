body:
  text: 臨川吳澄述德充符魯有兀者王駘從之遊者與仲尼相若常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虛而往實而歸固有不言之教無形而心成者邪是何人也仲尼曰夫子聖人也丘也直後而未往耳丘將以為師而況不若丘者乎奚假魯國丘將引天下而與從之常季曰彼兀者也而王先生其與庸亦遠矣若然者其用心也獨若之何仲尼曰死生亦大矣而不得與之變雖天地覆墜亦將不與之遺審乎無假而不與物遷命物之化而守其宗也常季曰何謂也仲尼曰自其異者視之肝瞻楚越也自其同者視之萬物皆一也夫若然者且不知耳目之所宜而遊心乎德之和物視其所一而不見其所喪視喪其足猶遺土也常季曰彼為己以其知得其心以其心得其常心物何為最之哉仲尼曰人莫鑑於流水而鑑於止水唯止能止衆止受命於地唯松柏獨也在冬夏青青受命於天唯舜獨也正幸能正生以正衆生夫保始之徵不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是而況官天地府萬物直寓六骸象耳目一知之所知而心未嘗死者乎彼且擇日而登假人則從是也彼且何肯以物為事乎右第一章申徒嘉兀者也而與鄭子産同師於伯昏無人子産謂申徒嘉曰我先出則子止子先出則我止其明日又與合堂同席而坐子産謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪且子見執政而不違子齊執政乎申徒嘉曰先生之門固有執政焉如此哉子而說子之執政而後人者也聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者先生也而猶出言若是不亦過乎子産曰子既若是矣猶與堯爭善計子之德不足以自反邪申徒嘉曰自狀其過以不當亡者衆不狀其過以不當存者寡知不可奈何而安之若命唯有德者能之遊於羿之彀中中央者中地也然而不中者命也人以其全足笑吾不全足者衆矣我怫然而怒而適先生之所則廢然而反不知先生之洗我以善邪吾與夫子遊十九年而未嘗知吾兀者也今子與我遊於形骸之內而子索我於形骸之外不亦過乎子産蹴然改容更貌曰子無乃稱右第二章魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前既犯患若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾身吾是以亡足今吾來也猶有尊足者存吾是以務全之也夫天無不覆地無不載吾以夫子為天地安知夫子之猶若是也孔子曰丘則陋矣夫子胡不入乎請講以所聞無趾出孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而況全德之人乎無趾語老聃曰孔丘之於至人其未邪彼何賔賔以學子為彼且蘄以諔詭幻怪之名聞不知至人之以是為己桎梏邪老聃曰胡不直使彼以死生為一條以可不可為一貫者解其桎梏其可乎無趾曰天刑之安可解右第三章魯哀公問於仲尼曰衛有惡人焉曰哀駘它丈夫與之處者思而不能去也婦人見之請於父母曰與為人妻寧為夫子妾者十數而未止也未嘗有聞其唱者也常和人而已矣無君人之位以濟乎人之死無聚祿以望人之腹又以惡駭天下和而不唱知不出乎四域且而雌雄合乎前是必有異乎人者也寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其為人也不至乎期年而寡人信之國無宰寡人傳國焉悶然而後應泛而若辭寡人醜乎卒授之國無幾何也去寡人而行寡人恤焉若有亡也若無與樂是國也是何人者也仲尼曰丘也嘗使於楚矣適見㹠子食於其死母者少焉眴若皆棄之而走不見己焉亦不得類焉亦所愛其母也非愛其形也愛使其形者也戰而死者其人之葬也不以翣資刖者之履無為愛之皆無其本矣為天子之諸御不爪翦不穿耳取妻者止於外不得復使形全猶足以為尓而況全德之人乎今哀駘它未言而信無功而親使人授己國唯恐其不受也是必才全而德不形者也哀公曰何謂才全仲尼曰死生存亡窮達貧富賢與不肖毁譽饑渴寒暑是事之變命之行也日夜相代乎前而知不能規乎其始者也故不足以滑和不可入於靈府使之和豫通而不失於兊使日夜無郤而與物為春是接而生時乎心者也是之謂才全何謂德不形曰平者水停之盛也其可以為法也內保之而外不蕩也德者成和之修也德不形者物不能離也哀公異日以告閔子曰始也吾以南面而君天下執民之紀而憂其死吾自以為至通矣今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔丘非君臣也德友而已矣右第四章閩跂支離無脤說衛靈公靈公說之而視全人其脰肩肩甕㼜大癭說齊桓公桓公說之而視全人其脰肩肩故德有所長而形有所忘人不忘其所忘而忘其所不忘此謂誠忘故聖人有所遊而知為孽約為膠德為接工為商聖人不謀惡用知不斫惡用膠無喪惡用德不貨惡用商四者天鬻也天鬻也者天食也既受食於天又惡用人右第五章有人之形無人之情有人之形故群於人無人之情故是非不得於身眇乎小哉所以屬於人也謷乎大哉獨成其天惠子謂莊子曰人故無情乎莊子曰然惠子曰人而無情何以謂之人莊子曰道與之貌天與之形惡得不謂之人惠子曰既謂之人惡得無情莊子曰是非吾所謂情也吾所謂吾情者言人之不以好惡內傷其身常因自然而不益生也惠子曰不益生何以有其身莊子曰道與之貌天與之形無以好惡內傷其身今子外乎子之神勞乎子之精倚樹而吟據槁梧而暝天選子之形子以堅白鳴右第六章大宗師知天之所為知人之所為者至矣知天之所為者天而生也知人之所為者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也雖然有患夫知有所待而後當其所待者特未定也庸詎知吾所謂天之非人乎所謂人之非天乎且有真人而後有真知何謂真人古之真人不逆寡不雄成不謨士若然者過而弗悔當而不自得也若然者登高不栗入水不濡入火不熱是知之能登假於道也若此古之真人其寢不夢其覺無憂其食不甘其息深深真人之息以踵衆人之息以喉屈服者其嗌言若哇其耆欲深者其天機淺古之真人不知說生不知惡死其出不欣其入不距翛然而往翛然而來而已矣不忘其所始不求其所終受而喜之忘而復之是之謂不以心捐道不以人助天是之謂真人若然者其心志其容寂其顙頯凄然似秋暖然似春喜怒通四時與物有宜而莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不為愛人故樂通物非聖人也有親非仁也天時非賢也利害不通非君子也行名失已非士也亡身不真非役人也若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也古之真人其狀義而不朋若不足而不承與乎其觚而不堅也張乎其虛而不華也邴邴乎其似喜乎崔乎其不得已乎滀乎進我色也與乎止我德也厲乎其似世乎謷乎其未可制也連乎其似好間也悗乎忘其言也以刑為體以禮為翼以知為時以德為循以刑為體者綽乎其殺也以禮為翼者所以行於世也以知為時者不得已於事也以德為循者言其與有足者至於丘也而人真以為勤行者也故其好之也一其弗好之也一其一也一其不一也一其一與天為徒其不一與人為徒天與人不相勝也是之謂真人泉涸魚相與處於陸相詬以濕相濡以沫不如相忘於江湖與其譽堯而非桀也不如兩忘而化其道夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也死生命也其有夜旦之常天也人之有所不得與皆物之情也彼特以天為父而身猶愛之而況其卓乎人特以有君為愈乎己而身猶死之而況其真乎夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也藏小大有宜猶有所遁若夫藏天下於天下而不得所遁是恆物之大情也特犯人之形而猶喜之若人之形者萬化而未始有極也其為樂可勝計邪故聖人將遊於物之所不得遁而皆存善夭善老善怒善終人猶效之又況萬物之所係而一化之所待乎夫道有情有信無為無形可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不為高在六極之下而不為深先天地生而不為久長於上古而不為老狶韋氏得之以挈天地伏羲氏得之以襲氣母維斗得之終古不忒日月得之終古不息堪壞得之以襲崑崙馮夷得之以遊大川肩吾得之以處大山黃帝得之以登雲天顓頊得之以處玄宫禺强得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五伯傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星右第一章南伯子葵問乎女偶曰子之年長矣而色若孺子何也曰吾聞道矣南伯子葵曰道可得學邪曰惡惡可子非其人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果為聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之參日而後能外天下已外天下矣吾又守之七日而後能外物已外物矣吾又守之九日而後能外生已外生矣而後能朝徹朝徹而後能見獨見獨而後能無古今無古今而後能入於不死不生殺生者不死生生者不生其為物無不將也無不迎也無不毁也無不成也其名為攖寧攖寧也者攖而後成者也南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥聞之參寥參寥聞之疑始右第二章子祀子與子犁子來四人相與語曰孰能以無為首以生為脊以死為尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與為友俄而子與有病子祀往問之曰偉哉夫造物者將以豫為此拘拘也曲僂發背上有五管頤隱於齊肩高於頂句贅指天陰陽之氣有沴其心間而無事跰𨇤而鑑于井曰嗟乎夫造物者又將以豫為此拘拘也子祀曰女惡之乎曰亡豫何惡浸假而化豫之左臂以為雞豫因以求時夜浸假而化豫之右臂以為彈豫因以求梟炙浸假而化豫之尻以為輪以神為馬豫因而乘之豈更駕哉且夫得者時也失者順也安時而處順哀樂不能入也此古之所謂縣解也而不能自解者物有結之且夫物不勝天久矣吾又何惡焉俄而子來有病喘喘然將死其妻子環而泣之犁往問之曰叱避無怛化倚其户與之語曰偉哉造化又將奚以汝為將奚以汝適以汝為鼠肝乎以汝為蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅於父母彼近吾死而我不聽我則悍矣彼何罪焉夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也今大冶鑄金金踴躍曰我且必為鏌鎁大冶必以為不祥之金今一犯人之形而曰人耳人耳夫造化者必以為不祥之人今一以天地為大爐以造化為大冶惡乎往而不可哉成然寐蘧然覺右第三章子桑户孟子反子琴張三人相與友曰孰能相與於無相與相為於無相為孰能登天遊霧撓挑無極相忘以生無所終窮三人相視而笑莫逆於心遂相與友莫然有間而子桑户死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎嗟來桑户乎而已反其真而我猶為人倚子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意子貢反以告孔子曰彼何人者邪修行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪孔子曰彼遊方之外者也而丘遊方之內者也外內不相及而丘使女往吊之丘則陋矣彼方且與造物者為人而遊乎天地之一氣彼以生為附贅縣疣以死為决疣潰癕夫若然者又惡知死生先後之所在假於異物託於同體忘其肝膽遺其耳目反覆終始不知端倪茫然倣徨乎塵垢之外逍遙乎無為之業彼又惡能憒憒然為世俗之禮以觀衆人之耳目哉子貢曰然則夫子何方之依曰丘天之戮民也雖然吾與汝共之子貢曰敢問其方孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定故曰魚相忘乎江湖人相忘乎道術子貢曰敢問畸人曰畸人者畸於人而侔於天故曰天之小人人之君子人之君子天之小人也右第四章顔回問仲尼曰孟孫才其母死哭泣無涕中心不戚居喪不哀無是三者以善喪蓋魯國固有無其實而得其名者乎回一怪之仲尼曰夫孟孫氏盡之矣進於知矣唯簡之而不得夫已有所簡矣孟孫氏不知所以生不知所以死不知就先不知就後若化為物以待其所不知之化已乎且方將化惡知不化哉方將不化惡知已化哉吾特與汝其夢未始覺者邪且彼有駭形而無損心有旦宅而無情死孟孫氏特覺人哭亦哭是自其所以乃且也相與吾之耳矣庸詎知吾所謂吾之乎且汝夢為為而厲乎夫夢為魚而沒於淵不識今之言者其覺者乎其夢者乎造適不及笑獻笑不及排安排而去化乃入於寥天一右第五章意而子見許由許由曰堯何以資汝意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來為軹夫堯既已黥汝以仁義而劓汝以是非矣汝將何以遊夫遙蕩恣睢轉徙之塗乎意而子曰雖然吾願遊於其藩許由曰不然夫盲者無以與乎眉目顔色之好瞽者無以與乎青黃黼黻之觀意而子曰夫無莊之失其美據梁之失其力黃帝之亡其知皆在爐捶之間耳庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生邪許由曰噫未可知也我為汝言其大略吾師乎吾師乎𩐎萬物而不為義澤及萬世而不為仁長於上古而不為老覆載天地刻雕衆形而不為巧此所遊已右第六章子輿與子桑友而霖雨十日子輿曰子桑殆病矣裹飯而往食之至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其為之者而不得也然而至此極者命也夫右第七章應帝王齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏有虞氏其猶藏仁以要人亦得人矣而未始出於非人泰氏其卧徐徐其覺于于一以己為馬一以己為牛其知情信其德甚真而未始入於非人右第一章肩吾見狂接輿狂接輿曰日中始何以語女肩吾曰告我君人者以己出經式義度人孰敢不聽而化諸接輿曰是欺德也其於治天下也猶涉海鑿河而使蚊負山也聖人之治也治外乎正而後行確乎能其事者而已矣且鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患而曾二蟲之無知右第二章天根遊於殷陽至蓼水之上適遭無名人而問焉曰請問為天下無名人曰去汝鄙人也何問之不預也豫方將與造物者為人厭則又乘夫莽眇之鳥以出六極之外而遊無何有之鄉以處壙埌之野汝又何舁以治天下感豫之心為又復問無名人曰汝遊心於淡合氣於漠順物自然而無容私焉而天下治矣右第三章陽子居見老聃曰有人於此嚮疾彊梁物徹疏明學道不倦如是者可比明王乎老聃曰是於聖人也胥易技係勞形怵心者也且也虎豹之文耒田猿狙之便執斄之狗耒籍如是可比明王乎陽子居蹴然曰敢問明王之治老聃曰明王之治功蓋天下而似不自己化貸萬物而民弗恃有莫舉名使物自喜立乎不測而遊於無有者也右第四章鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走列子見之而心醉歸以告壺子曰吾鄉示之以大沖莫勝是殆見吾衡氣機也鯢桓之審為淵止水之審為淵流水之審為淵淵有九名此處三焉嘗又與耒明日又與之見壺子立未定自失而走壺子曰追之列子追之不及反以報壺子曰已滅矣已失矣吾弗及已壼子曰嚮吾示之以未始出吾宗吾與之虛而委蛇不知其誰何因以為弟靡因以為波流故逃也然後列子自以為未始學而歸三年不出為其妻爨食豕如食人於事無與親雕琢復朴塊然獨以其形立紛而封哉一以是終右第五章無為名尸無為謀府無為事任無為知主體盡無窮而遊無眹盡其所受乎天而無見得告壺子曰始吾以夫子之道為至矣則又有至焉者矣壺子曰吾與汝既其文未既其實而固得道與衆雌而無雄而又奚卵焉而以道與世亢必信夫故使人得而相汝嘗試與來以豫示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕灰焉列子入泣涕沾襟以告壺子壺子曰鄉吾示之以地文萌乎不震不正是殆見吾杜德機也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣全然有生矣吾見其杜權矣列子入以告壺子壺子曰鄉吾示之以天壤名實不入而機發於踵是殆見吾善者機也嘗又與來明日又與之見壺子出而謂列子曰子之先生不齊吾無得而相焉試齊且復相之列子入以告壺子壼子亦虛而已至人之用心若鏡不將不迎應而不藏故能勝物而不傷南海之帝為鯈北海之帝為忽中央之帝為渾沌倏與忽時相與遇於渾沌之地渾沌待之甚善鯈與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿七竅七日而渾沌死右第六章莊子內篇訂正卷下
