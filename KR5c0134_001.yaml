body:
  text: 臨川吳澄迷逍遙遊北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南溟南溟者天池也齊諧者志怪者也諧之言曰鵬之徙於南溟也水擊三千里搏扶搖而上者九萬里去以六月息者也野馬也塵埃也生物之以息相吹也天之蒼蒼其正色邪其遠而無所至極邪其視下也亦若是則已矣且夫水之積也不厚則負大舟也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南蜩與鷽鳩笑之曰我决起而飛槍榆枋時則不至而控於地而已矣奚以之九萬里而南為適莽蒼者三餐而反腹猶果然適百里者宿春糧適千里者三月聚糧之二蟲又何知小知不及大知小年不及大年奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞衆人匹之不亦悲乎湯之問棘也是已窮髮之北有冥海者天池也有魚焉其廣數千里未有知其修者其名為鯤有鳥焉其名為鵬背若泰山冀若垂天之雲搏扶搖羊角而上者九萬里絶雲氣負青天然後圖南且適南溟也斥鴳笑之曰彼且奚適也我騰躍而上不過數仞而下翶翔蓬蒿之間此亦飛之至也而彼且奚適也此大小之辨也故夫知效一官行比一鄉德合一君而徵一國者其自視也亦若此矣而宋榮子猶然笑之且舉世而譽之而不加勸舉世而非之而不加沮定乎內外之分辨乎榮辱之竟斯已矣彼其於世未數數然也雖然猶有未樹也夫列子御風而行冷然善也旬有五日而後反彼於致福者未數數然也此雖免乎行猶有所待者也若夫乘天地之正而御六氣之辨以遊無窮者彼且惡乎待哉故曰至人無已神人無功聖人無名右第一章堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎夫豫立而天下治而我猶尸之吾自視缺然請致天下許由曰子治天下天下既已治也而我猶代子吾將為名乎名者實之賔也吾將為賔乎鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹歸休乎君豫無所用天下為庖人雖不治庖尸祝不越樽俎而代之矣右第二章肩吾問於連叔曰吾聞言於接輿大而無當往而不反吾驚怖其言猶河漢而無極也大有徑庭不近人情焉連叔曰其言謂何哉曰藐姑射之山有神人居焉肌膚若冰雪綽約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外其神凝使物不疵癘而年穀熟吾以是狂而不信也連叔曰然瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫知亦有之是其言也猶時女也之人也之德也將磅礴萬物以為一世蘄乎亂孰弊焉以天下為事之人也物莫之傷大浸稽天而不溺大旱金石流土山焦而不熱是其塵垢粃糠將猶陶鑄堯舜者也孰肯以物為事宋人資章甫而適諸越越人斷髮文身無所用之堯治天下之民平海內之政往見四子藐姑射之山汾水之陽窅然喪其天下焉右第三章惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠落無所容非不呺然大也吾為其無用而掊之莊子曰夫子固拙於用大矣宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻技百金請與之客得之以說吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也今子以五石之瓠何不慮以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫右第四章惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子曰子獨不見狸狌乎卑身而伏以候敖者東西跳梁不避高下中於機辟死於網罟今夫斄牛其大若垂天之雲此能為大矣而不能執鼠今子有大樹患其無用何不樹之於無何有之鄉廣莫之野倣徨乎無為其側逍遙乎寢卧其下不夭斤斧物無害者無所可用安所困苦哉右第五章齊物論南郭子綦隱几而坐仰天而噓嗒焉似喪其耦顔成子游立侍乎前曰何居乎形固可使如槁木而心固可使如死灰乎今之隱几者非昔之隱几者也子綦曰偃不亦善乎而問之也今者吾喪我汝知之乎女聞人籟而未聞地籟女聞地籟而未聞天籟夫子游曰敢問其方子綦曰夫大塊噫氣其名為風是唯無作作則萬竅怒呺而獨不聞之翏翏乎山林之畏佳大木百圍之竅穴似鼻似口似耳似枅似圈似臼似窪似汙者激者謞者叱者吸者叫者濠者宎者咬者前者唱于而隨者唱喁泠風則小和飄風則大和厲風濟則衆竅為虛而獨不見之調調之刁刁乎子游曰地籟則衆竅是已人籟則比竹是已敢問天籟子綦曰夫吹萬不同而使其自己也咸其自取怒者其誰邪右第一章大知間間小知間間大言炎炎小言詹詹其寐也魂交其覺也形開與接為構日以心鬬縵者窖者密者小恐惴惴大恐縵縵其發若機栝其司是非之謂也其留如詛盟其守勝之謂也其殺如秋冬以言其日消也其溺之所為之不可使復之也其厭也如緘以言其老洫也近死之心莫使復陽也喜怒哀樂慮嘆變慹姚佚啓態樂出虛蒸成菌日夜相代乎前而莫知其所萌已乎已乎旦暮得此其所由以生乎非彼無我非我無所取是亦近矣而不知其所為使若有真宰而特不得其眹可行已信而不見其形有情而無形百骸九竅六藏賅而存焉吾誰與為親汝皆說之乎其有私焉如是皆有為臣妾乎其臣妾不足以相治乎其遞相為君臣乎其有真君存焉如求得其情與不得元益損乎其真一受其成形不亡以待盡與物相刃相靡其行盡如馳而莫之能止不亦悲乎終身役役而不見其成功𦬼然疲役而不知其所歸可不哀耶人謂之不死奚益其形化其心與之然可不謂大哀乎人之生也固若是芒乎其我獨芒而人亦有不芒者乎夫隨其誠心而師之誰獨且無師乎奚必知代而心自取者有之愚者與有焉未成乎心而有是非是今日適越而昔至也是以元有為有元有為有雖有神禹且不能知吾獨且奈何哉夫言非吹也言者有言其所言者特未定也果有言邪其未嘗有言邪其以為異於鷇音亦有辨乎其無辨乎道惡乎隱而有真僞言惡乎隱而有是非道惡乎往而不存言惡乎存而不可道隱於小成言隱於榮華故有儒墨之是非以是其所非而非其所是欲是其所非而非其所是則莫若以明物元非彼物無非是自彼則不見自知則知之故曰彼出於是是亦因彼彼是方生之說也雖然方生方死方死方生方可方不可方不可方可因是因非因非因是是以聖人不由而照之于天亦因是也是亦彼也彼亦是也彼亦一是非此亦一是非果且有彼是乎哉果且無彼是乎哉彼是莫得其偶謂之道樞樞始得其環中以應無窮是亦一無窮非亦一無窮也故曰莫若以明以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也可乎可不可乎不可道行之而成物謂之而然惡乎然然於然惡乎不然不然於不然物固有所然物固有所可無物不然無物不可故為是舉莛與楹厲與西施恢恑譎怪道通為一其分也成也其成也毁也凡物無成與毁復通為一唯達者知通為一為是不用而寓諸庸庸也者用也用也者通也通也者得也適得而幾矣因是已已而不知其然謂之道勞神明為一而不知其同也謂之朝三何謂朝三曰狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆徂皆悅名實未虧而喜怒為用亦因是也是以聖人和之以是非而休乎天鈞是之謂兩行古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣不可以加矣其次以為有物矣而未始有封也其次以為有封焉而未始有是非也是非之彰也道之所以虧也道之所以虧愛之所以成果且有成與虧乎哉果且無成與虧乎哉有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也昭文之鼓琴也師曠之枝策也惠子之據梧也三子之知幾乎皆其盛者也故載之末年唯其好之也以異於彼其好之也欲以明之彼非所明而明之故以堅白之昧終而其子又以文之綸終終身無成若是而可謂成乎雖然亦成也若是而不可謂成乎物與我無成也是故滑疑之耀聖人之所圖也為是不用而寓諸庸此之謂以明今且有言於此不知其與是類乎其與是不類乎類與不類相與為類則與彼無以異矣雖然請嘗言之有始也者有未始有始也者有未始有夫未始有始也者有有也者有無也者有未始有無也者有未始有夫未始有無也者俄而有無矣而未知有無之果孰有孰無也今我則已有謂矣而未知吾所謂之其果有謂乎其果無謂乎天下莫大於秋毫之末而太山為小莫壽乎殤子而彭祖為夭天地與我並生而萬物與我為一既已為一矣且得有言乎既已謂之一矣且得無言乎一與言為二二與一為三自此以往巧歷不能得而況其凡乎故自無適有以至於三而況自有適有乎無適焉因是已夫道未始有封言未始有常為是而有畛也請言其畛有左有右有倫有義有分有辨有競有爭此之謂八德六合之外聖人存而不論六合之內聖人論而不議春秋經世先王之志聖人議而不辨故分也者有不分也辨也者有不辨也曰何也聖人懷之衆人辨之以相示也故曰辨也者有不見也夫大道不稱大辨不言大仁不仁大廉不嗛大勇不忮道昭而不道言辨而不及仁常而不成廉清而不信勇忮而不成五者園而幾向方矣故知止其所不知至矣孰知不言之辨不道之道若有能知此之謂天府注焉而不滿酌焉而不竭而不知其所由來此之謂保光故昔者堯問於舜曰我欲伐宗膾胥敖南面而不釋然其故何也舜曰夫三子者猶存乎蓬艾之間若不釋然何哉昔者十日並出萬物皆照而況德之進乎日者乎右第二章齧缺問乎王倪曰子知物之所同是乎曰吾惡乎知之子知豫之所不知邪曰吾惡乎知之然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知之非不知邪庸詎知吾所謂不知之非知邪且吾嘗試問乎女民濕寢則腰疾偏死鰌然乎哉木處則惴栗恂懼猿猴然乎哉三者孰知正處民食芻豢麋鹿食薦蝍且甘帶鴟鴉耆鼠四者孰知正味猿猵狙以為雌麋與鹿交鰌與魚游毛嬙麗姬人之所美也魚見之深入鳥見之高飛麋鹿見之决驟四者孰知天下之正色哉自我觀之仁義之端是非之塗樊然淆亂吾惡能知其辨齧缺曰子不知利害則至人固不知利害乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚若然者乘雲氣騎日月而遊乎四海之外死生無變於已而況利害之端乎右第三章瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務不就利不違害不喜求不緣道無謂有謂有謂無謂而遊乎塵埃之外夫子以為孟浪之言而我以為妙道之行也吾子以為奚若長梧子曰是黃帝之所聽熒也而丘也何足以知之且女亦大早計見卵而求時夜見彈而求梟炙豫嘗為女妄言之女以妄聽之奚旁日月挾宇宙為其吻合置其滑涽以隸相尊衆人役役聖人愚芚參萬歲而一成純萬物盡然而以是相藴豫惡乎知說生之非惑邪豫惡乎知惡死之非弱喪而不知歸者邪麗之姬艾封人之子也晋國之始得之也涕泣沾襟及其至於王所與王同筐牀食芻豢而後悔其泣也豫惡乎知夫死者不悔其始之蘄生乎夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也而愚者自以為覺竊竊然知之君乎牧乎固哉丘也與女皆夢也豫謂女夢亦夢也是其言也其名為弔詭萬世之後而一遇大聖知其解者是旦暮遇之也既使我與若辨矣若勝我我不若勝若果是也我果非也邪我勝若若不吾勝我果是也而果非也邪其或是也其或非也邪其俱是也其俱非也邪我與若不能相知也則人固受其黮暗吾誰使正之使同乎若者正之既與若同矣惡能正之使同乎我者正之既同乎我矣惡能正之使異乎我與若者正之既異乎我與若者惡能正之使同乎我與若者正之既同乎我與若矣惡能正之然則我與若與人俱不能相知也而待彼也邪何謂和之以天倪曰是不是然不然是若果是也則是之異乎不是也亦無辨然若果然也則然之異乎不然也亦無辨化聲之相待若其不相待和之以天倪因之以曼衍所以窮年也忘年忘義振於無竟故寓諸無竟罔兩問景曰曩子行今子止曩子坐今子起何其無特操與景曰吾有待而然者邪吾所待又有待而然者邪吾待蛇蚹蜩冀邪惡識所以然惡識所以不然昔者莊周夢為蝴蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此之謂物化右第四章養生主吾生也有涯而知也無涯以有涯隨無涯殆已已而為知者殆而已矣為善無近名為惡無近刑緣督以為經可以保身可以全生可以養親可以盡年庖丁為文惠君解牛手之所觸肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之會文惠君曰嘻善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未嘗見全牛也方今之時臣以神遇而不以目視官知止而神欲行依乎天理批大卻導大竅因其故然技經肯綮之未嘗而況大軱乎良庖歲更刀割也族庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難為怵然為戒視為止行為遲動刀甚微謋然已解如土委地提刀而立為之四顧為之躊躇滿志善刀而藏之文惠君曰善哉吾聞庖丁之言得養生焉右第一章公文軒見右師而驚曰是何人也惡乎介也天與其人與曰天也非人也天之生是使獨也人之貌有與也以是知其天也非人也澤雉十步一啄百步一飲不蘄畜乎樊中神雖王不善也右第二章老聃死秦失吊之三號而出弟子曰非夫子之友邪曰然然則弔焉若此可乎曰然始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者是遁天倍情忘其所受古者謂之遁天之刑適來夫子時也適去夫子順也安時而處順哀樂不能入也古者謂是帝之縣解指窮於為薪火傳也不知其盡也右第三章人間世顔回見仲尼請行曰奚之曰將之衛曰奚為焉曰回聞衛君其年壯其行獨輕用其國而不見其過輕用民死死者以國量乎澤若焦民其無如矣回嘗聞之夫子曰治國去之亂國就之醫門多疾願以所聞思其則庶幾其國有瘳乎仲尼曰嘻若殆往而刑耳夫道不欲雜雜則多多則擾擾則憂憂而不救古之至人先存諸己而後存諸人所存於己者未定何暇至於暴人之所行且若亦知夫德之所蕩而知之所為出乎哉德蕩乎名知出乎爭名也者相軋也知也者爭之器也二者凶器非所以盡行也且德厚信矼未達人氣名聞不爭未達人心而彊以仁義繩墨之言術暴人之前者是以人惡有其美也命之曰菑人菑人者人必反菑之若殆為人菑夫且苟為悅賢而惡不肖惡用而求有以異若唯無詔王公必將乘人而鬭其捷而目將熒之而色將平之口將營之容將形之心且成之是以火救火以水救水名之曰益多順始無窮若殆以不信厚言必死於暴人之前矣且昔者桀殺關龍逄紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也故其君因其修以擠之是好名者也昔者堯攻叢枝胥敖禹攻有扈國為虛厲身為刑戮其用兵不止其求實元已是皆求名實者也而獨不聞之乎名實者聖人之所不能勝也而況若乎雖然若必有以也嘗以語我來顔回曰端而虛勉而一則可乎曰惡惡可夫以陽為充孔揚采色不定常人之所不違因案人之所感以求容與其心名之曰日漸之德不成而況大德乎將執而不化外合而內不訾其庸詎可乎然則我內直而外曲成而上比內直者與天為徒與天為徒者知天子之與已皆天之所子而獨以已言蘄乎而人善之蘄乎而人不善之邪若然者人謂之童子是之謂與天為徒外曲者與人之為徒也擎跽曲拳人臣之禮也人皆為之吾敢不為邪為人之所為者人亦無疵焉是之謂與人為徒成而上比者與古為徒其言雖教謫之實也古之有也非吾有也若然者雖直不為病是之謂與古為徒若是則可乎仲尼曰惡惡可大多政法而不諜雖固亦無罪雖然止是耳矣夫胡可以及化猶師心者也顔回曰吾無以進矣敢問其方仲尼曰齊吾將語若有而為之其易邪易之者皥天不宜顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以為齊乎曰是祭杞之齊非心齊也回曰敢問心齊仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齊也顔回曰回之未始得使實自回也得使之也未始有回也可謂虛乎夫子曰盡矣吾語若若能入遊其樊而無感其名入則鳴不入則止無門無毒一宅而寓於不得已則幾矣絶迹易無行地難為人使易以僞為天使難以僞聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也瞻彼闋者虛室生白吉祥止止夫且不止是之謂坐馳夫徇耳目內通而外於心知鬼神將來舍而況人乎是萬物之化也舜禹之所紐也伏戲几遽之所行終而況散焉者乎而況散焉者乎顔回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然曰何謂坐忘顔回曰墮肢體黜聰明離形去智同於大通此謂坐忘仲尼曰同則無好也化則無常也而果其賢乎丘也請從而後也右第一章葉公子高將使於齊問於仲尼曰王使諸梁也甚重齊之待使者蓋將甚敬而不急匹夫猶未可動也而況諸侯乎吾甚栗之子嘗語諸梁也曰凡事若小若大寡不道以歡成事若不成則必有人道之患事若成則必有陰陽之患若成若不成而後無患者唯有德者能之吾食也執粗而不臧爨無欲清之人今吾朝受命而夕飲冰我其內熱與吾未至乎事之情而既有陰陽之患矣事若不成必有人道之患是兩也為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間是之謂大戒是以夫事其親也不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也為人臣子者固有所不得已行事之情而忘其身何暇至於悅生而惡死夫子其行可矣丘請復以所聞凡交近則必相靡以信遠則必忠之以言言必或傳之夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類也妄妄則其信之也莫莫則傳言者殃故法言曰傳其常情無傳其溢言則幾乎全且以巧鬭力者始乎陽常卒乎陰泰至則多奇巧以禮飲酒者始乎治常卒乎亂泰至則多奇樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨言者風波也行者實喪也夫風波易以動實喪易以危故忿設無由巧言偏辭獸死不擇音氣息茀然於是並生心厲剋核泰至則必有不肖之心應之而不知其然也苟為不知其然也孰知其所終故法言曰無遷令無勸成過度益也遷令勸成殆事美成在久惡成不及改可不愼與且夫乘物以遊心託不得已以養中至矣何作為報也莫若為致命此其難者右第二章顔闔將傳衛靈公太子而問於蘧伯玉曰有人於此其德天殺與之為無方則危吾國與之為有方則危吾身其知適足以知人之過而不知其所以過若然者吾奈之何蘧伯玉曰善哉問乎戒之愼之正女身哉形莫若就心莫若和雖然之二者有患就不欲入和不欲出形就而入且為顚為滅為崩為蹶心和而出且為聲為名為妖為孽彼且為嬰兒亦與之為嬰兒彼且為無町畦亦與之為無町畦彼且為無崖亦與之為無崖達之入於無疵汝不知夫螳蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也戒之愼之積伐而美者以犯之幾矣汝不知夫養虎者乎不敢以生物與之為其殺之之怒也不敢以全物與之為其决之之怒也時其饑飽達其怒心虎之與人異類而媚養己者順也故其殺者逆也夫愛馬者以筐盛矢以蜄盛溺適有蚊虻僕緣而拊之不時則缺銜毁首碎胸意有所至而愛有所亡可不愼邪右第三章匠石之齊至乎曲轅見櫟社樹其大蔽牛潔之百圍其高臨山十仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰已矣勿言之矣散木也以為舟則沈以為棺槨則速腐以為器則速毁以為門户則液樠以為柱則蠹是不材之木也無所可用故能若是之壽匠石歸櫟社見夢曰女將惡乎比豫哉若將比豫於文木耶夫柤梨橘柚果兩之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是且豫求無所可用久矣幾死乃今得之為豫大用使豫也而有用且得有此大也邪且也若與豫也皆物也奈何哉其相物也而幾死之散人又惡知散木匠石覺而診其夢弟子曰趣取無用則為社何邪曰密若無言彼亦直寄焉以為不知己者詬厲也不為社者且幾有翦乎且也彼其所保與衆異而以義喻之不亦遠乎右第四章南伯子綦遊乎商之丘見大木焉有異結駟千乘隱將芘其所籟子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂酲三日而不已子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材宋有荆氏者宜楸柏桑其栱把而上者求狙猴之𣏾者斬之三圍四圍求高名之麗者斬之七圍八圍貴人富商之家求禪傍者斬之故未終其天年而中道之天於斧斤此材之患也故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河此皆巫祝以知之矣所以為不祥也此乃神人之所以為大祥也右第五章支離疏者頤隱於齊肩高於頂會撮指天五管在上兩髀為脅挫針治繲足以糊口鼓策播精足以食十人上徵武士則支離攘臂於其間上有大役則支離以有常疾不受功上與病者粟則受三鍾與十束薪夫支離其形者猶足以養其身終其天年又况支離其德者乎孔子適楚楚狂接輿遊其門曰鳳子鳳子何如德之衰也來世不可待往世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行郤曲無傷吾足山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也右第六章莊子內篇訂正卷上
